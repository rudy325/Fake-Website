<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: #2d8cff;
      color: white;
      padding: 1.5rem 2rem;
      text-align: center;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 { font-size: 1.5rem; font-weight: 600; }
    nav a {
      color: white;
      text-decoration: none;
      margin-left: 1.5rem;
      font-size: 0.95rem;
      opacity: 0.85;
    }
    nav a:hover { opacity: 1; }
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 2.5rem;
      max-width: 600px;
      width: 100%;
      text-align: center;
    }
    .card h2 { margin-bottom: 0.5rem; font-size: 1.25rem; }
    .card p { color: #666; margin-bottom: 1.5rem; line-height: 1.6; }
  </style>
</head>
<body>
  <header>
    <h1>Demo Support Center</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="demo.html">Demo</a>
    </nav>
  </header>
  <main>
    <div class="card">
      <h2>Need Help?</h2>
      <p>Use the chat widget in the corner to connect with our support team.</p>
    </div>
  </main>

  <script
    type="module"
    src="https://us01ccistatic.zoom.us/us01cci/web-sdk/zcc-sdk.js"
    data-apikey="KXMmdnnUS0OpE1E9qOOblA"
    data-env="us01"
  ></script>
</body>
</html>
